services:
  web:
    build: ./backend
    container_name: fleet_web
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "18100:8000"
    #command: >
    # sh -c "python manage.py migrate &&
    #       python manage.py runserver 0.0.0.0:8000"
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

  db:
    image: postgres:16
    container_name: fleet_postgres
    environment:
      POSTGRES_DB: fleet
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
    ports:
      - "5542:5432"
    volumes:
      - fleet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: fleet_redis
    ports:
      - "6380:6379"

volumes:
  fleet_pgdata:
